steps:
  # ── UNIT TEST ──────────────────────────────────────────────────────────────
  - name: alpine
    id: unit-test
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache curl jq > /dev/null

        TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
          "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
          | jq -r '.access_token')

        BASE_URL="https://dataform.googleapis.com/v1beta1/projects/$PROJECT_ID/locations/$_DATAFORM_REGION/repositories/$_DATAFORM_REPOSITORY"

        echo "Unit test : compilation du commit $COMMIT_SHA..."
        RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"gitCommitish\": \"$COMMIT_SHA\"}" \
          "$$BASE_URL/compilationResults")

        COMPILATION_NAME=$(echo "$$RESPONSE" | jq -r '.name')
        if [ -z "$$COMPILATION_NAME" ] || [ "$$COMPILATION_NAME" = "null" ]; then
          echo "Echec de la compilation : $$RESPONSE"
          exit 1
        fi

        ERRORS=$(echo "$$RESPONSE" | jq '.compilationErrors | length')
        if [ "$$ERRORS" -gt 0 ]; then
          echo "Erreurs de compilation détectées :"
          echo "$$RESPONSE" | jq '.compilationErrors'
          exit 1
        fi

        echo "Unit test OK - aucune erreur de compilation."
        echo "$$COMPILATION_NAME" > /workspace/test_compilation_name.txt

  # ── INTEGRATION TEST ───────────────────────────────────────────────────────
  - name: alpine
    id: integration-test
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache curl jq > /dev/null

        TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
          "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
          | jq -r '.access_token')

        BASE_URL="https://dataform.googleapis.com/v1beta1/projects/$PROJECT_ID/locations/$_DATAFORM_REGION/repositories/$_DATAFORM_REPOSITORY"
        COMPILATION_NAME=$(cat /workspace/test_compilation_name.txt)

        echo "Integration test : lancement du workflow (tag: $\_TEST_TAG)..."
        RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"compilationResult\": \"$$COMPILATION_NAME\",
            \"invocationConfig\": {
              \"includedTags\": [\"$_TEST_TAG\"],
              \"transitiveDependenciesIncluded\": true,
              \"fullyRefreshIncrementalTablesEnabled\": false
            }
          }" \
          "$$BASE_URL/workflowInvocations")

        INVOCATION_NAME=$(echo "$$RESPONSE" | jq -r '.name')
        if [ -z "$$INVOCATION_NAME" ] || [ "$$INVOCATION_NAME" = "null" ]; then
          echo "Echec du lancement du workflow : $$RESPONSE"
          exit 1
        fi

        INVOCATION_ID=$(basename "$$INVOCATION_NAME")
        echo "Workflow invocation créé : $$INVOCATION_ID"

        while true; do
          STATE=$(curl -sf \
            -H "Authorization: Bearer $$TOKEN" \
            "$$BASE_URL/workflowInvocations/$$INVOCATION_ID" \
            | jq -r '.state')

          echo "Etat : $$STATE"
          case "$$STATE" in
            SUCCEEDED) echo "Integration test OK."; break ;;
            FAILED|CANCELLED|CANCELING)
              echo "Integration test échoué (état: $$STATE)."
              exit 1 ;;
            *) sleep 15 ;;
          esac
        done

  # ── ENSURE RELEASE CONFIG ──────────────────────────────────────────────────
  - name: alpine
    id: ensure-release-config
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache curl jq > /dev/null

        TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
          "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
          | jq -r '.access_token')

        BASE_URL="https://dataform.googleapis.com/v1beta1/projects/$PROJECT_ID/locations/$_DATAFORM_REGION/repositories/$_DATAFORM_REPOSITORY"

        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $$TOKEN" \
          "$$BASE_URL/releaseConfigs/$_RELEASE_CONFIG")

        if [ "$$STATUS" = "404" ]; then
          echo "Release config '$_RELEASE_CONFIG' introuvable, création en cours..."
          curl -sf -X POST \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"gitCommitish\": \"$_GIT_BRANCH\"}" \
            "$$BASE_URL/releaseConfigs?releaseConfigId=$_RELEASE_CONFIG"
          echo "Release config créée."
        else
          echo "Release config '$_RELEASE_CONFIG' déjà existante."
        fi

  # ── CREATE COMPILATION RESULT ──────────────────────────────────────────────
  - name: alpine
    id: create-compilation-result
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache curl jq > /dev/null

        TOKEN=$(curl -sf -H "Metadata-Flavor: Google" \
          "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
          | jq -r '.access_token')

        BASE_URL="https://dataform.googleapis.com/v1beta1/projects/$PROJECT_ID/locations/$_DATAFORM_REGION/repositories/$_DATAFORM_REPOSITORY"
        RELEASE_CONFIG_REF="projects/$PROJECT_ID/locations/$_DATAFORM_REGION/repositories/$_DATAFORM_REPOSITORY/releaseConfigs/$_RELEASE_CONFIG"

        RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"releaseConfig\": \"$$RELEASE_CONFIG_REF\"}" \
          "$$BASE_URL/compilationResults")

        NAME=$(echo "$$RESPONSE" | jq -r '.name')
        if [ -z "$$NAME" ] || [ "$$NAME" = "null" ]; then
          echo "Erreur : $$RESPONSE"
          exit 1
        fi
        echo "Compilation result créé : $$NAME"

substitutions:
  _DATAFORM_REGION: europe-west1
  _DATAFORM_REPOSITORY: YOUR_DATAFORM_REPOSITORY_NAME
  _RELEASE_CONFIG: YOUR_RELEASE_CONFIG_NAME
  _GIT_BRANCH: main
  _TEST_TAG: test

options:
  logging: CLOUD_LOGGING_ONLY
